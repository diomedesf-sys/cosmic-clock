<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Round Cosmic Clock - Dashboard</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        background-color: #f4f4f4;
        margin: 0;
        padding: 20px;
        font-family: sans-serif;
        box-sizing: border-box;
      }

      .dashboard-title {
        margin: 0 0 4px 0;
        font-size: 1.5rem;
        color: #333;
        letter-spacing: 2px;
        text-align: center;
        text-transform: uppercase;
      }

      .dashboard-subtitle {
        margin: 0 0 4px 0;
        font-size: 0.75rem;
        color: #888;
        letter-spacing: 3px;
        text-align: center;
        text-transform: uppercase;
      }

      .dashboard-location {
        margin: 0 0 12px 0;
        font-size: 0.7rem;
        color: #aaa;
        letter-spacing: 2px;
        text-align: center;
        text-transform: uppercase;
      }

      .frame-toggle-group {
        display: flex;
        gap: 10px;
        margin: 0 0 30px 0;
      }

      .frame-toggle {
        min-width: 46px;
        padding: 1.5px 3.5px;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: #fff;
        color: #555;
        font-size: 6px;
        letter-spacing: 0.25px;
        text-transform: uppercase;
        text-align: center;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .frame-toggle:hover {
        transform: scale(1.03);
      }

      .frame-toggle.active {
        border-color: #d4af37;
        color: #b8860b;
        box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
      }

      /* "WHERE ARE THEY NOW?" PANEL */
      .ephemeris-panel {
        margin-top: 30px;
        text-align: center;
        width: 100%;
        max-width: 500px;
      }

      .ephemeris-row {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
        margin: 12px 0;
      }

      .ephemeris-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid #cbd5e1;
        background: #fff;
        font-size: 24px;
        font-family: "Georgia", serif;
        cursor: pointer;
        transition: all 0.15s ease;
        line-height: 1;
      }

      .ephemeris-btn:hover {
        transform: scale(1.1);
      }

      .ephemeris-btn.active {
        border-color: #d4af37;
        box-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
      }

      #select-sun {
        color: #e0a800;
      }
      #select-moon {
        color: #94a3b8;
      }
      #select-mercury {
        color: #38bdf8;
      }
      #select-venus {
        color: #f472b6;
      }
      #select-mars {
        color: #ef4444;
      }
      #select-jupiter {
        color: #a855f7;
      }
      #select-saturn {
        color: #16a34a;
      }

      .ephemeris-readout {
        font-size: 1rem;
        color: #333;
        letter-spacing: 1px;
        min-height: 1.5em;
      }

      /* 1. THE APP WRAPPER */
      .app-layout {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 40px;
        width: 100%;
        max-width: 1400px;
      }

      /* 2. THE LEFT PANEL */
      .left-panel {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 295px; /* Just wide enough for two petit cards + gap */
        flex-shrink: 0;
      }

      /* 3. THE ROWS */
      .card-row-center {
        display: flex;
        justify-content: center; /* Centers the top card (The Pyramid Tip) */
        width: 100%;
      }

      .card-row-split {
        display: flex;
        justify-content: space-between; /* Places the two cards side by side */
        width: 100%;
      }

      /* 4. THE PETIT CARD BASE */
      .card-petit {
        width: 140px;
        height: 175px; /* 4:5 Aspect Ratio */
        background-color: #000;
        border-radius: 12px;
        border: 1px solid #222;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      /* 5. BLACK CARD INNER STYLING */
      .card-top-label {
        height: 25%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 5px;
      }

      .card-pill {
        border: 1px solid #ffd700;
        border-radius: 4px;
        padding: 3px 5px;
        display: flex;
        align-items: center;
        gap: 5px;
        max-width: 95%; /* Keeps it from touching the edges */
      }

      .pill-label {
        font-size: 5px;
        color: #a0aec0;
        font-weight: 800;
        letter-spacing: 0.5px;
        border-right: 1px solid rgba(255, 255, 255, 0.2);
        padding-right: 5px;
        text-transform: uppercase;
        text-align: right;
        line-height: 1.2;
      }

      .pill-value {
        font-size: 7px; /* Very small so full names fit */
        color: #ffd700;
        font-weight: bold;
        text-transform: uppercase;
        line-height: 1.2;
        white-space: normal; /* Allows text to wrap to a second line if very long */
        text-align: left;
      }

      .card-artwork {
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 10px; /* The breathing room space */
        color: #e2e8f0;
      }

      .artwork-symbol {
        font-size: 3.5rem;
        line-height: 1;
        font-family: "Georgia", serif;
      }

      .artwork-number {
        font-size: 2.5rem;
        font-weight: 700;
        font-family: "Arial", sans-serif;
        color: #ffd700;
      }

      .card-progress {
        height: 15%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2px;
        padding-bottom: 5px;
      }

      /* 6. THE FLIP CLOCKS (White Cards) */
      .card-white {
        background-color: #ffffff;
        border: 1px solid #cbd5e1;
        align-items: center;
      }

      .time-label {
        font-family: "Impact", "Arial Black", sans-serif;
        font-size: 14px;
        color: #1a202c;
        letter-spacing: 1px;
        text-transform: uppercase;
        height: 25%;
        display: flex;
        align-items: center;
      }

      .flip-clock-display {
        background: #202020;
        color: #ffffff;
        border-radius: 8px;
        position: relative;
        width: 85%;
        flex-grow: 1;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 8px 15px rgba(0, 0, 0, 0.4),
          inset 0 2px 5px rgba(255, 255, 255, 0.1);
        font-family: "Arial", sans-serif;
        font-size: 3.5rem;
        letter-spacing: -2px;
        line-height: 1;
        font-weight: 700;
      }

      .flip-clock-display::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 2px;
        background: #000;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.15);
        z-index: 3;
      }

      /* 7. THE CLOCK (Protagonist Size) */
      .astroclock-container {
        width: 75vmin;
        height: 75vmin;
        min-width: 300px;
        min-height: 300px;
        background-color: #000;
        border-radius: 50%;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      svg {
        width: 100%;
        height: 100%;
      }
      .ring {
        fill: none;
        stroke: #333;
        stroke-width: 3;
      }
      .spoke {
        stroke: #666;
        stroke-width: 2;
        stroke-dasharray: 5, 5;
      }
      svg text {
        text-anchor: middle;
        dominant-baseline: central;
      }
      .zodiac-symbol {
        font-size: 28px;
        font-family: "Georgia", serif;
      }
      .planet-symbol {
        font-size: 40px;
        fill: #1a202c;
        font-family: "Georgia", serif;
      }
      #sun {
        fill: #fff;
      }
      #moon {
        fill: #fff;
      }
      #mercury {
        fill: #fff;
      }
      #venus {
        fill: #fff;
      }
      #mars {
        fill: #fff;
      }
      #jupiter {
        fill: #fff;
      }
      #saturn {
        fill: #fff;
      }
      .ascendant-marker {
        font-size: 46px;
        fill: #d4af37;
        font-family: "Georgia", serif;
      }
      .decan-mark {
        fill: #fff;
        r: 4;
      }
      .decan-mark.active {
        fill: #fff;
      }

      /* RESPONSIVE STACKING */
      @media (max-width: 1000px) {
        .app-layout {
          flex-direction: column;
        }
        .left-panel {
          order: 2;
        }
        .astroclock-container {
          order: 1;
          width: 85vmin;
          height: 85vmin;
          margin-bottom: 30px;
        }
      }
    </style>
  </head>

    <script>
      function placeOnRing(elementId, degrees, ringRadius) {
        const mathDegrees = degrees + 180;
        const radians = mathDegrees * (Math.PI / 180);
        const x = ringRadius * Math.cos(radians);
        const y = -(ringRadius * Math.sin(radians));
        const element = document.getElementById(elementId);
        element.setAttribute("x", x);
        element.setAttribute("y", y);
      }

      // Counter-rotates an element about its own (x, y) so its glyph stays
      // upright even while the sky-frame group rotates around the origin.
      function setUpright(elementId, x, y, rotation) {
        const element = document.getElementById(elementId);
        if (!element) return;
        if (rotation) {
          element.setAttribute("transform", `rotate(${-rotation} ${x} ${y})`);
        } else {
          element.removeAttribute("transform");
        }
      }

      function placeCircleOnRing(elementId, degrees, ringRadius) {
        const mathDegrees = degrees + 180;
        const radians = mathDegrees * (Math.PI / 180);
        const x = ringRadius * Math.cos(radians);
        const y = -(ringRadius * Math.sin(radians));
        const element = document.getElementById(elementId);
        element.setAttribute("cx", x);
        element.setAttribute("cy", y);
      }

      // 36 decan-boundary marks around the outer ring; the one the
      // Ascendant has just passed lights up gold.
      function buildDecanMarks() {
        const group = document.getElementById("decan-marks");
        for (let i = 0; i < 36; i++) {
          const circle = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "circle",
          );
          circle.setAttribute("id", `decan-mark-${i}`);
          circle.setAttribute("class", "decan-mark");
          group.appendChild(circle);
          placeCircleOnRing(`decan-mark-${i}`, i * 10, 480);
        }
      }

      function updateDecanMarks(decanNumber) {
        const activeIndex = decanNumber - 1;
        for (let i = 0; i < 36; i++) {
          const mark = document.getElementById(`decan-mark-${i}`);
          mark.classList.toggle("active", i === activeIndex);
        }
      }

      // Planets within this many degrees of each other are considered conjunct
      const CONJUNCTION_ORB = 5;
      const PLANET_RING_RADIUS = 430;
      const CONJUNCTION_STEP = 22;

      function placePlanets(longitudes) {
        const entries = Object.entries(longitudes)
          .map(([id, lon]) => ({ id, lon }))
          .sort((a, b) => a.lon - b.lon);

        // Group consecutive planets (going around the circle) that are
        // within CONJUNCTION_ORB degrees of their neighbor into clusters.
        const clusters = [[entries[0]]];
        for (let i = 1; i < entries.length; i++) {
          const prev = entries[i - 1];
          const curr = entries[i];
          if (curr.lon - prev.lon <= CONJUNCTION_ORB) {
            clusters[clusters.length - 1].push(curr);
          } else {
            clusters.push([curr]);
          }
        }
        // Merge first/last clusters if they wrap around 0deg/360deg
        if (clusters.length > 1) {
          const first = clusters[0];
          const last = clusters[clusters.length - 1];
          if (first[0].lon + 360 - last[last.length - 1].lon <= CONJUNCTION_ORB) {
            clusters[0] = last.concat(first);
            clusters.pop();
          }
        }

        clusters.forEach((cluster) => {
          const n = cluster.length;
          cluster.forEach((entry, i) => {
            const offset = (i - (n - 1) / 2) * CONJUNCTION_STEP;
            placeOnRing(entry.id, entry.lon, PLANET_RING_RADIUS + offset);
          });
        });
      }

      const Astro = {
        RAD: Math.PI / 180,
        DEG: 180 / Math.PI,
        norm: (a) => {
          a %= 360;
          return a < 0 ? a + 360 : a;
        },
        getDeltaT: () => 69.4,
        getJD: (date) => date.getTime() / 86400000 + 2440587.5,
        getT: (jd) => {
          const dt = Astro.getDeltaT() / 86400;
          return (jd + dt - 2451545.0) / 36525.0;
        },
      };

      const PLANET_DATA = {
        Sun: {
          L: [280.466, 36000.769],
          a: 1.0,
          e: 0.0167,
          p: 282.94,
          symbol: "☉",
        },
        Moon: {
          L: [218.316, 481267.881],
          a: 0.002,
          e: 0.0549,
          p: 83.35,
          symbol: "☽",
        },
        Mercury: {
          L: [252.251, 149472.674],
          a: 0.387,
          e: 0.2056,
          p: 77.45,
          symbol: "☿",
        },
        Venus: {
          L: [181.98, 58517.815],
          a: 0.723,
          e: 0.0067,
          p: 131.53,
          symbol: "♀",
        },
        Mars: {
          L: [355.453, 19140.302],
          a: 1.523,
          e: 0.0934,
          p: 336.04,
          symbol: "♂",
        },
        Jupiter: {
          L: [34.404, 3034.746],
          a: 5.202,
          e: 0.0484,
          p: 14.72,
          symbol: "♃",
        },
        Saturn: {
          L: [49.944, 1222.113],
          a: 9.554,
          e: 0.0555,
          p: 92.43,
          symbol: "♄",
        },
      };

      const ZODIAC_SIGNS = [
        { name: "Aries", symbol: "♈", element: "Fire" },
        { name: "Taurus", symbol: "♉", element: "Earth" },
        { name: "Gemini", symbol: "♊", element: "Air" },
        { name: "Cancer", symbol: "♋", element: "Water" },
        { name: "Leo", symbol: "♌", element: "Fire" },
        { name: "Virgo", symbol: "♍", element: "Earth" },
        { name: "Libra", symbol: "♎", element: "Air" },
        { name: "Scorpio", symbol: "♏", element: "Water" },
        { name: "Sagittarius", symbol: "♐", element: "Fire" },
        { name: "Capricorn", symbol: "♑", element: "Earth" },
        { name: "Aquarius", symbol: "♒", element: "Air" },
        { name: "Pisces", symbol: "♓", element: "Water" },
      ];

      const ELEMENT_COLORS = {
        Fire: "#dc2626",
        Earth: "#92400e",
        Air: "#f97316",
        Water: "#2563eb",
      };

      // 5 moments of the day, ordered Aurora -> Vespera.
      // "start" is degrees AFTER sunrise (Aurora always begins at 0 = sunrise).
      const MOMENTS = [
        { name: "Aurora", symbol: "🌅", start: 0 },
        { name: "Matutina", symbol: "🌄", start: 70 },
        { name: "Meridiana", symbol: "☀️", start: 140 },
        { name: "Nocturna", symbol: "🌙", start: 210 },
        { name: "Vespera", symbol: "🌆", start: 280 },
      ];

      // Default to Constanza, RD until/unless geolocation succeeds
      const OBSERVER = { lat: 18.9, lon: -69.75 };

      // "Where Are They Now?" panel state
      const PLANET_NAMES = {
        sun: "Sun",
        moon: "Moon",
        mercury: "Mercury",
        venus: "Venus",
        mars: "Mars",
        jupiter: "Jupiter",
        saturn: "Saturn",
      };
      let selectedPlanet = null;
      let lastPlanetLongitudes = {};

      // Which point stays fixed on screen: Aries 0deg (the universal
      // reference) or the Ascendant (the personal/horizon reference).
      let frameMode = "aries"; // "aries" | "ascendant"

      // Fixed (x, y) of each zodiac symbol, in sky-frame-local coordinates,
      // captured once when the wheel is built.
      const ZODIAC_LABEL_POS = [];

      function renderEphemeris() {
        const readout = document.getElementById("ephemeris-readout");
        if (!selectedPlanet || !(selectedPlanet in lastPlanetLongitudes)) {
          readout.textContent = "Click on it and find out";
          return;
        }
        const lon = lastPlanetLongitudes[selectedPlanet];
        const sign = getZodiacSign(lon);
        const ms = getMinuteSecond(lon);
        readout.textContent =
          `${PLANET_NAMES[selectedPlanet]} — ${sign.symbol} ${sign.name} ` +
          `${String(ms.minute).padStart(2, "0")}'${String(ms.second).padStart(2, "0")}"`;
      }

      function calculateGeocentric(id, T, earth) {
        const p = PLANET_DATA[id];
        const L = Astro.norm(p.L[0] + p.L[1] * T);
        const M = Astro.norm(L - p.p);
        const E = M + p.e * Astro.DEG * Math.sin(M * Astro.RAD);
        const xv = p.a * (Math.cos(E * Astro.RAD) - p.e);
        const yv = p.a * (Math.sqrt(1 - p.e * p.e) * Math.sin(E * Astro.RAD));
        const r = Math.sqrt(xv * xv + yv * yv);
        const v = Math.atan2(yv, xv) * Astro.DEG;
        const hLon = Astro.norm(v + p.p);
        const xh = r * Math.cos(hLon * Astro.RAD);
        const yh = r * Math.sin(hLon * Astro.RAD);
        const xe = earth.r * Math.cos(earth.lon * Astro.RAD);
        const ye = earth.r * Math.sin(earth.lon * Astro.RAD);
        return Astro.norm(Math.atan2(yh - ye, xh - xe) * Astro.DEG);
      }

      function calculateAscendant(jd, T) {
        const gmst = (280.4606 + 360.985647 * (jd - 2451545.0)) % 360;
        const lmst = (gmst + OBSERVER.lon + 360) % 360;
        const eps = 23.439 - 0.013 * T;
        const num = Math.cos(lmst * Astro.RAD);
        const den =
          -Math.sin(lmst * Astro.RAD) * Math.cos(eps * Astro.RAD) -
          Math.tan(OBSERVER.lat * Astro.RAD) * Math.sin(eps * Astro.RAD);
        return Astro.norm(Math.atan2(num, den) * Astro.DEG);
      }

      // Sunrise = the instant the Sun's ecliptic longitude IS the Ascendant
      // (the Sun has ~0 ecliptic latitude, so this is the moment it rises).
      // Used to re-anchor the 5 Moments cycle to "Aurora = today's sunrise degree".
      let sunriseAscLon = 0;
      let sunriseKey = null;

      function findSunriseAscLon(referenceDate) {
        const baseDate = new Date(
          referenceDate.getFullYear(),
          referenceDate.getMonth(),
          referenceDate.getDate(),
        );
        const startJD = Astro.getJD(baseDate);

        const signedDiff = (jd) => {
          const T = Astro.getT(jd);
          const sLon = Astro.norm(
            PLANET_DATA.Sun.L[0] + PLANET_DATA.Sun.L[1] * T,
          );
          const aLon = calculateAscendant(jd, T);
          let d = Astro.norm(aLon - sLon);
          if (d > 180) d -= 360;
          return d;
        };

        const STEP_MIN = 2;
        let prevJD = startJD;
        let prevD = signedDiff(prevJD);
        for (let m = STEP_MIN; m <= 1440; m += STEP_MIN) {
          const jd = startJD + m / 1440;
          const d = signedDiff(jd);
          if (prevD < 0 && d > 0) {
            let lowJD = prevJD;
            let highJD = jd;
            for (let i = 0; i < 25; i++) {
              const midJD = (lowJD + highJD) / 2;
              if (signedDiff(midJD) < 0) {
                lowJD = midJD;
              } else {
                highJD = midJD;
              }
            }
            const finalJD = (lowJD + highJD) / 2;
            return calculateAscendant(finalJD, Astro.getT(finalJD));
          }
          prevJD = jd;
          prevD = d;
        }
        return 0;
      }

      // A "minute" is one whole degree within the sign (0-29).
      // A "second" is 1/30th of that degree (0-29).
      // 1 minute ~= 4 real minutes, 1 second ~= 8 real seconds.
      function getMinuteSecond(longitude) {
        const normalized = ((longitude % 360) + 360) % 360;
        const positionInSign = normalized % 30;
        const minute = Math.floor(positionInSign);
        const fraction = positionInSign - minute;
        const second = Math.floor(fraction * 30);
        return { minute, second };
      }

      function getZodiacSign(longitude) {
        const normalized = ((longitude % 360) + 360) % 360;
        return ZODIAC_SIGNS[Math.floor(normalized / 30)];
      }

      function getDecanNumber(longitude) {
        const normalized = ((longitude % 360) + 360) % 360;
        return Math.floor(normalized / 10) + 1;
      }

      function getMoment(ascendantDegree) {
        let current = MOMENTS[0];
        for (let i = MOMENTS.length - 1; i >= 0; i--) {
          if (ascendantDegree >= MOMENTS[i].start) {
            current = MOMENTS[i];
            break;
          }
        }
        return current;
      }

      // --- ENERGY BAR FUNCTIONS ---
      function renderBars(filled, total, width, highlightIndex = null) {
        let bars = "";
        for (let i = 0; i < total; i++) {
          const isFilled = highlightIndex !== null ? i === highlightIndex : i < filled;
          const barStyle = isFilled
            ? "background: #4f46e5; box-shadow: 0 0 4px rgba(79, 70, 229, 0.5);"
            : "background: #e2e8f0;";
          bars += `<div style="flex: 1; height: 100%; border-radius: 2px; ${barStyle}"></div>`;
        }
        return `<div style="display: flex; gap: 2px; width: ${width}; height: 6px;">${bars}</div>`;
      }

      function getDecanProgress(degree) {
        return renderBars(degree % 10, 10, "60%");
      }

      function getSignProgress(degree) {
        return renderBars(Math.floor(degree / 3), 10, "60%");
      }

      function getMomentProgress(momentOffset) {
        // Vespera's last 10deg (the dusk threshold) gets its own marker:
        // a single lit cell centered in the row, instead of a fill bar.
        if (momentOffset >= 350) {
          return renderBars(0, 7, "50%", 3);
        }
        const decanNumber = Math.floor(momentOffset / 10) + 1;
        const filledBars = ((decanNumber - 1) % 7) + 1;
        return renderBars(filledBars, 7, "50%");
      }

      // --- ZODIAC WHEEL & SPOKES (built once from the same math as the planets) ---
      function buildZodiacWheel() {
        const SVG_NS = "http://www.w3.org/2000/svg";
        const dividers = document.getElementById("dividers");
        const wheel = document.getElementById("zodiac-wheel");

        for (let i = 0; i < 12; i++) {
          const lon = i * 30;
          const mathRad = (lon + 180) * Astro.RAD;

          // Spoke from center to outer ring
          const x = 480 * Math.cos(mathRad);
          const y = -(480 * Math.sin(mathRad));
          const spoke = document.createElementNS(SVG_NS, "line");
          spoke.setAttribute("class", "spoke");
          spoke.setAttribute("x1", "0");
          spoke.setAttribute("y1", "0");
          spoke.setAttribute("x2", x);
          spoke.setAttribute("y2", y);
          dividers.appendChild(spoke);

          // Zodiac symbol at the sector midpoint (lon + 15deg), one ring in from the outer edge
          const midRad = (lon + 15 + 180) * Astro.RAD;
          const lx = 330 * Math.cos(midRad);
          const ly = -(330 * Math.sin(midRad));

          const label = document.createElementNS(SVG_NS, "text");
          label.setAttribute("id", `zodiac-symbol-${i}`);
          label.setAttribute("class", "zodiac-symbol");
          label.setAttribute("x", lx);
          label.setAttribute("y", ly);
          label.setAttribute("fill", ELEMENT_COLORS[ZODIAC_SIGNS[i].element]);
          // ︎ forces text-style (monochrome) rendering instead of color emoji
          label.textContent = ZODIAC_SIGNS[i].symbol + "︎";
          wheel.appendChild(label);
          ZODIAC_LABEL_POS.push({ x: lx, y: ly });
        }
      }

      function updateClockHands() {
        const now = new Date();
        const jd = Astro.getJD(now);
        const T = Astro.getT(jd);

        // Re-anchor "Aurora = sunrise" once per day (or when location changes)
        const dayKey = `${now.toDateString()}|${OBSERVER.lat.toFixed(2)}|${OBSERVER.lon.toFixed(2)}`;
        if (dayKey !== sunriseKey) {
          sunriseAscLon = findSunriseAscLon(now);
          sunriseKey = dayKey;
        }

        const sunLon = Astro.norm(
          PLANET_DATA.Sun.L[0] + PLANET_DATA.Sun.L[1] * T,
        );
        const earth = { r: 1.0, lon: Astro.norm(sunLon + 180) };
        const moonLon = Astro.norm(
          PLANET_DATA.Moon.L[0] +
            PLANET_DATA.Moon.L[1] * T +
            6.29 * Math.sin((134.96 + 477198.86 * T) * Astro.RAD),
        );
        const ascLon = calculateAscendant(jd, T);

        const planetLongitudes = {
          sun: sunLon,
          moon: moonLon,
          mercury: calculateGeocentric("Mercury", T, earth),
          venus: calculateGeocentric("Venus", T, earth),
          mars: calculateGeocentric("Mars", T, earth),
          jupiter: calculateGeocentric("Jupiter", T, earth),
          saturn: calculateGeocentric("Saturn", T, earth),
        };
        placePlanets(planetLongitudes);
        placeOnRing("ascendant", ascLon, 480);
        document.getElementById("ascendant").style.display =
          frameMode === "ascendant" ? "none" : "";

        // Rotate the whole sky-frame so either Aries 0deg (universal) or
        // the Ascendant (personal/horizon) stays anchored at the fixed point.
        const rotation = frameMode === "ascendant" ? ascLon : 0;
        document
          .getElementById("sky-frame")
          .setAttribute("transform", `rotate(${rotation})`);

        // Keep zodiac sign glyphs upright as the wheel spins beneath them
        ZODIAC_LABEL_POS.forEach((pos, i) => {
          setUpright(`zodiac-symbol-${i}`, pos.x, pos.y, rotation);
        });

        // Keep planet glyphs upright too
        Object.keys(planetLongitudes).forEach((id) => {
          const el = document.getElementById(id);
          setUpright(id, el.getAttribute("x"), el.getAttribute("y"), rotation);
        });

        lastPlanetLongitudes = planetLongitudes;
        renderEphemeris();

        // Minutes and seconds (base-30, ~4 real min / ~8 real sec each)
        const ascendantMS = getMinuteSecond(ascLon);
        document.getElementById("ui-min").textContent = String(
          ascendantMS.minute,
        ).padStart(2, "0");
        document.getElementById("ui-sec").textContent = String(
          ascendantMS.second,
        ).padStart(2, "0");

        // Decan (1-36)
        const decanNumber = getDecanNumber(ascLon);
        document.getElementById("ui-decan").textContent =
          "Decan " + decanNumber;
        document.getElementById("art-decan-number").textContent =
          decanNumber;
        document.getElementById("bar-decan").innerHTML = getDecanProgress(
          ascendantMS.minute,
        );
        updateDecanMarks(decanNumber);

        // Zodiac sign
        const sign = getZodiacSign(ascLon);
        document.getElementById("ui-sign").textContent = sign.name;
        const signSymbolEl = document.getElementById("art-sign-symbol");
        // ︎ forces text-style (monochrome) rendering instead of color emoji
        signSymbolEl.textContent = sign.symbol + "︎";
        signSymbolEl.style.color = ELEMENT_COLORS[sign.element];
        document.getElementById("bar-sign").innerHTML = getSignProgress(
          ascendantMS.minute,
        );

        // 5 moments of the day, counted from this morning's sunrise (Aurora = 0)
        const momentOffset = Astro.norm(ascLon - sunriseAscLon);
        const moment = getMoment(momentOffset);
        document.getElementById("ui-moment").textContent = moment.name;
        document.getElementById("art-moment-symbol").textContent =
          moment.symbol;
        document.getElementById("bar-moment").innerHTML =
          getMomentProgress(momentOffset);
      }

      // Defaults to Constanza (set on OBSERVER above) unless/until the
      // browser's geolocation prompt is accepted.
      function requestLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            OBSERVER.lat = pos.coords.latitude;
            OBSERVER.lon = pos.coords.longitude;
          },
          () => {},
        );
      }

      document.querySelectorAll(".ephemeris-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const alreadySelected = btn.dataset.planet === selectedPlanet;
          document
            .querySelectorAll(".ephemeris-btn")
            .forEach((b) => b.classList.remove("active"));
          if (alreadySelected) {
            selectedPlanet = null;
          } else {
            btn.classList.add("active");
            selectedPlanet = btn.dataset.planet;
          }
          renderEphemeris();
        });
      });

      document.querySelectorAll(".frame-toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          frameMode = btn.dataset.mode;
          document.querySelectorAll(".frame-toggle").forEach((b) => {
            b.classList.toggle("active", b.dataset.mode === frameMode);
          });
        });
      });

      buildZodiacWheel();
      buildDecanMarks();
      requestLocation();
      updateClockHands();
      setInterval(updateClockHands, 1000);
    </script>
  </body>
</html>
